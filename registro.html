<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ASISTE-UNILIBRE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">ASISTE-UNILIBRE</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="funcionalidades.html">Funcionalidades</a></li>
                <li><a href="usuarios.html">Usuarios</a></li>
                <li><a href="login.html">Acceso</a></li>
            </ul>
        </nav>
    </header>

    <section class="login-section">
        <h2>Registro de Usuario</h2>
        <div class="login-container">
            <form class="login-form">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ingrese su nombre completo" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo Institucional</label>
                    <input type="email" id="email" placeholder="correo@unilibre.edu.co" required>
                </div>
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" placeholder="Cree su usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Cree su contraseña" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" placeholder="Confirme su contraseña" required>
                </div>
                <div class="form-group">
                    <label for="rol">Tipo de Usuario</label>
                    <select id="rol" required>
                        <option value="">Seleccione...</option>
                        <option value="docente">Docente</option>
                        <option value="estudiante">Estudiante</option>
                    </select>
                </div>
                <button type="submit" class="login-button">Registrarse</button>
                <a href="login.html" class="forgot-password">¿Ya tiene cuenta? Inicie sesión</a>
            </form>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <h2>Integrantes</h2>
            <p>Kevin, Miguel, Andrés</p>
            <p>&copy; 2024 Mi Sitio Web. Todos los derechos reservados.</p>
        </div>
    </footer>
</body>
</html>
