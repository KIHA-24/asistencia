<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - ASISTE-UNILIBRE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">ASISTE-UNILIBRE</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="perfil.html">Mi Perfil</a></li>
                <li><a href="notificaciones.html">Notificaciones</a></li>
                <li><a href="index.html">Cerrar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <section class="content-section">
        <div class="content-container">
            <div class="page-header">
                <button onclick="history.back()" class="btn-back">← Volver</button>
                <h2>👤 Mi Perfil</h2>
            </div>
            
            <div class="perfil-container">
                <div class="perfil-sidebar">
                    <div class="perfil-avatar">
                        <div class="avatar-circle">👤</div>
                        <button class="btn-small">Cambiar Foto</button>
                    </div>
                    <div class="perfil-info">
                        <h3>Usuario Ejemplo</h3>
                        <p>usuario@unilibre.edu.co</p>
                        <span class="badge badge-estudiante">Estudiante</span>
                    </div>
                </div>

                <div class="perfil-content">
                    <div class="perfil-section">
                        <h3>Información Personal</h3>
                        <form class="perfil-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Nombre Completo</label>
                                    <input type="text" class="form-control" value="Usuario Ejemplo">
                                </div>
                                <div class="form-group">
                                    <label>Documento</label>
                                    <input type="text" class="form-control" value="1234567890">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Email Institucional</label>
                                    <input type="email" class="form-control" value="usuario@unilibre.edu.co">
                                </div>
                                <div class="form-group">
                                    <label>Teléfono</label>
                                    <input type="tel" class="form-control" value="3001234567">
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Dirección</label>
                                <input type="text" class="form-control" value="Calle 123 #45-67">
                            </div>

                            <button type="submit" class="btn-primary">Guardar Cambios</button>
                        </form>
                    </div>

                    <div class="perfil-section">
                        <h3>Cambiar Contraseña</h3>
                        <form class="perfil-form">
                            <div class="form-group">
                                <label>Contraseña Actual</label>
                                <input type="password" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Nueva Contraseña</label>
                                <input type="password" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Confirmar Nueva Contraseña</label>
                                <input type="password" class="form-control">
                            </div>
                            <button type="submit" class="btn-primary">Cambiar Contraseña</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <p>&copy; 2024 ASISTE-UNILIBRE. Todos los derechos reservados.</p>
        </div>
    </footer>
</body>
</html>
